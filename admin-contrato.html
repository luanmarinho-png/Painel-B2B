<script>
window._SUPA_REST_URL = 'https://cvwwucxjrpsfoxarsipr.supabase.co/rest/v1';
window._getAdminToken = async function() {
  try {
    const sb = typeof getSupabaseClient === 'function' ? getSupabaseClient() : null;
    if (!sb) return '';
    let { data: { session } } = await sb.auth.getSession();
    if (!session?.access_token) {
      const { data: refreshData, error } = await sb.auth.refreshSession();
      if (error || !refreshData?.session) return '';
      session = refreshData.session;
    }
    return session?.access_token || '';
  } catch (_) {}
  return '';
};
window._SUPA_REST_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2d3d1Y3hqcnBzZm94YXJzaXByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDIxMzgsImV4cCI6MjA5MDg3ODEzOH0.GdpReqo9giSC607JQge8HA9CmZWi-2TcVggU4jCwZhI';
window._supaRest = async function(table, query) {
  const resp = await fetch('/.netlify/functions/anon-data-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ table, query: query || '' })
  });
  if (!resp.ok) throw new Error(await resp.text() || `HTTP ${resp.status}`);
  return resp.json();
};
window._supaRestAdmin = async function(table, query, opts) {
  const token = await window._getAdminToken();
  if (!token) throw new Error('Sessão expirada — faça login no painel admin e abra esta página novamente.');
  const payload = { table, method: 'GET', query: query || '' };
  if (opts && opts.maskSensitive) payload.maskSensitive = true;
  const resp = await fetch('/.netlify/functions/admin-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify(payload)
  });
  if (resp.status === 401) throw new Error('Sessão expirada — faça login no painel admin.');
  if (!resp.ok) throw new Error(await resp.text() || `HTTP ${resp.status}`);
  return resp.json();
};
window._supaWrite = async function(table, method, body, extra) {
  const token = await window._getAdminToken();
  if (!token) throw new Error('Sessão expirada');
  let prefer = 'return=minimal';
  if (method === 'POST') prefer = 'return=representation,resolution=merge-duplicates';
  if (method === 'GET') prefer = '';
  if (extra && extra.prefer !== undefined) prefer = extra.prefer;
  const payload = { table, method, body, prefer };
  if (extra && extra.requireSuperadmin) payload.requireSuperadmin = true;
  return fetch('/.netlify/functions/admin-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify(payload)
  });
};
</script>
<style>
  :root {
    --bg: #0f1117;
    --bg-card: #181b23;

  .page { max-width: 920px; margin: 0 auto; padding: 32px 24px 120px; }

    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;

  .edit-banner {

  .ativ-data { font-size: 0.75rem; color: var(--text-muted); }

  .ativ-delete {

    .topbar { padding: 0 16px; }

</style>
</head>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const ies = (params.get('ies') || '').trim();

  /** Valores padrão legados (planilha MedCof) — usados só para pré-preencher quando não há linha em contratos_ies */
  const LEGACY_DEFAULTS = {
    facene:              { nome:"FACENE",              status_contrato:"Assinado", localidade:"Mossoró — RN",           plano:"Regular", modulos:"Internato + ENAMED", material_fisico:false, sim_tendencias_qtd:3, sim_personalizados_qtd:3, sim_personalizados_impressos:false, condicao_alunos_previos:"Reembolso parcial ou cancelamento de parcelas futuras — proporcional ao tempo de uso" },
    unicet:              { nome:"UNICET",              status_contrato:"Assinado", localidade:"Teresina — PI",          plano:"Elite",   modulos:"Internato + ENAMED", material_fisico:false, sim_tendencias_qtd:3, sim_personalizados_qtd:2, sim_personalizados_impressos:true,  condicao_alunos_previos:"Reembolso parcial ou cancelamento de parcelas futuras — proporcional ao tempo de uso" },
    unisc:               { nome:"UNISC",               status_contrato:"Assinado", localidade:"Santa Cruz do Sul — RS", plano:"Regular", modulos:"Internato + ENAMED", material_fisico:false, sim_tendencias_qtd:3, sim_personalizados_qtd:2, sim_personalizados_impressos:true,  condicao_alunos_previos:"Reembolso parcial ou cancelamento de parcelas futuras — proporcional ao tempo de uso" },
    univassouras:        { nome:"UNIVASSOURAS",        status_contrato:"Assinado", localidade:"Vassouras — RJ",         plano:"Regular", modulos:"Internato + ENAMED", material_fisico:false, sim_tendencias_qtd:3, sim_personalizados_qtd:2, sim_personalizados_impressos:false, condicao_alunos_previos:"Reembolso parcial ou cancelamento de parcelas futuras — proporcional ao tempo de uso" },
    unifeso:             { nome:"UNIFESO",             status_contrato:"Assinado", localidade:"Teresópolis — RJ",       plano:"Regular", modulos:"Internato + ENAMED", material_fisico:false, sim_tendencias_qtd:3, sim_personalizados_qtd:3, sim_personalizados_impressos:true,  condicao_alunos_previos:"Reembolso parcial ou cancelamento de parcelas futuras — proporcional ao tempo de uso" },
    famene:              { nome:"FAMENE",              status_contrato:"Assinado", localidade:"João Pessoa — PB",       plano:"Regular", modulos:"Internato + ENAMED", material_fisico:false, sim_tendencias_qtd:3, sim_personalizados_qtd:3, sim_personalizados_impressos:false, condicao_alunos_previos:"Reembolso parcial ou cancelamento de parcelas futuras — proporcional ao tempo de uso" },
    unichristus:         { nome:"UNICHRISTUS",         status_contrato:"Assinado", localidade:"Fortaleza — CE",         plano:"Regular", modulos:"Internato + ENAMED", material_fisico:false, sim_tendencias_qtd:3, sim_personalizados_qtd:2, sim_personalizados_impressos:true,  condicao_alunos_previos:"Não haverá reembolso ou cancelamento de parcelas futuras de alunos prévios MedCof" },
    "uninassau-cacoal":  { nome:"UNINASSAU CACOAL",    status_contrato:"Assinado", localidade:"Cacoal — RO",            plano:"Elite",   modulos:"Internato + ENAMED", material_fisico:true,  sim_tendencias_qtd:3, sim_personalizados_qtd:2, sim_personalizados_impressos:true,  condicao_alunos_previos:"Reembolso parcial ou cancelamento de parcelas futuras — proporcional ao tempo de uso" },
    "uninassau-vilhena": { nome:"UNINASSAU VILHENA",   status_contrato:"Assinado", localidade:"Vilhena — RO",           plano:"Elite",   modulos:"Internato + ENAMED", material_fisico:true,  sim_tendencias_qtd:3, sim_personalizados_qtd:2, sim_personalizados_impressos:true,  condicao_alunos_previos:"Reembolso parcial ou cancelamento de parcelas futuras — proporcional ao tempo de uso" },
    "uninassau-recife":  { nome:"UNINASSAU RECIFE",    status_contrato:"Assinado", localidade:"Recife — PE",            plano:"Elite",   modulos:"Internato + ENAMED", material_fisico:true,  sim_tendencias_qtd:3, sim_personalizados_qtd:2, sim_personalizados_impressos:true,  condicao_alunos_previos:"Reembolso parcial ou cancelamento de parcelas futuras — proporcional ao tempo de uso" },
    "uninassau-barreiras": { nome:"UNINASSAU BARREIRAS", status_contrato:"Assinado", localidade:"Barreiras — BA",       plano:"Elite",   modulos:"Internato + ENAMED", material_fisico:true,  sim_tendencias_qtd:3, sim_personalizados_qtd:2, sim_personalizados_impressos:true,  condicao_alunos_previos:"Reembolso parcial ou cancelamento de parcelas futuras — proporcional ao tempo de uso" }
  };

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  }

  function valStr(v) { return v == null ? '' : String(v); }
  function valBool(v) { return v === true || v === 'true' || v === 1 || v === '1'; }
  function valInt(v) {
    const n = parseInt(String(v).replace(/\D/g, ''), 10);
    return Number.isFinite(n) ? n : 0;
  }

  const root = document.getElementById('contractRoot');
  const saveBar = document.getElementById('saveBar');

  if (!ies) {
    root.innerHTML = '<div class="error-box">Informe a instituição na URL (ex.: admin-contrato.html?ies=cesmac). Acesse pelo painel admin.</div>';
    return;
  }

  document.getElementById('pageTitle').textContent = 'Contrato — ' + ies.toUpperCase();
  document.getElementById('pageSubtitle').textContent = 'Informações contratuais, pacote e simulados — slug: ' + ies;
  document.title = 'MedCof B2B — Contrato ' + ies;

  async function loadInstNome() {
    try {
      const rows = await window._supaRest('instituicoes', 'select=nome,cidade,slug&slug=eq.' + encodeURIComponent(ies));
      if (rows && rows[0]) {
        const n = rows[0].nome || ies;
        document.getElementById('topbarIes').textContent = n;
        document.getElementById('pageTitle').textContent = 'Contrato — ' + n;
        document.getElementById('pageSubtitle').textContent =
          'Informações contratuais, pacote e simulados de ' + n + ' × MedCof';
        document.title = 'MedCof B2B — Contrato ' + n;
        return rows[0];
      }
    } catch (_) {}
    document.getElementById('topbarIes').textContent = ies.toUpperCase();
    return null;
  }

  /**
   * Monta o objeto do formulário. Se já existe linha em contratos_ies, o banco é a única fonte
   * (não mistura planilha legada — assim alterações salvas não são reaplicadas ao recarregar).
   */
  function mergeDefaults(dbRow, legacy, instRow) {
    const empty = function () {
      return {
        ies_slug: ies,
        status_contrato: '',
        numero_contrato: '',
        localidade: instRow && instRow.cidade ? String(instRow.cidade) : '',
        data_inicio: '',
        data_fim: '',
        valor_mensalidade: '',
        forma_pagamento: '',
        dia_vencimento: '',
        plano: '',
        modulos: '',
        material_fisico: false,
        licencas_contratadas: '',
        sim_tendencias_qtd: 0,
        sim_personalizados_qtd: 0,
        sim_personalizados_impressos: false,
        tendencias_realizadas: '',
        personalizados_realizados: '',
        condicao_alunos_previos: '',
        resp_nome: '',
        resp_email: '',
        resp_telefone: '',
        resp_cargo: '',
        observacoes_gerais: '',
        observacoes_comercial: ''
      };
    };

    const fromDb = dbRow && typeof dbRow === 'object';

    if (fromDb) {
      const o = empty();
      Object.keys(o).forEach(function (k) {
        if (dbRow[k] === undefined || dbRow[k] === null) return;
        if (k === 'material_fisico' || k === 'sim_personalizados_impressos') {
          o[k] = valBool(dbRow[k]);
          return;
        }
        if (k === 'sim_tendencias_qtd' || k === 'sim_personalizados_qtd') {
          o[k] = valInt(dbRow[k]);
          return;
        }
        o[k] = dbRow[k];
      });
      if ((!o.localidade || !String(o.localidade).trim()) && instRow && instRow.cidade) {
        o.localidade = String(instRow.cidade);
      }
      return o;
    }

    const o = empty();
    if (legacy) {
      if (legacy.localidade) o.localidade = legacy.localidade;
      if (legacy.status_contrato) o.status_contrato = legacy.status_contrato;
      if (legacy.plano) o.plano = legacy.plano;
      if (legacy.modulos) o.modulos = legacy.modulos;
      o.material_fisico = !!legacy.material_fisico;
      o.sim_tendencias_qtd = legacy.sim_tendencias_qtd != null ? valInt(legacy.sim_tendencias_qtd) : o.sim_tendencias_qtd;
      o.sim_personalizados_qtd = legacy.sim_personalizados_qtd != null ? valInt(legacy.sim_personalizados_qtd) : o.sim_personalizados_qtd;
      o.sim_personalizados_impressos = !!legacy.sim_personalizados_impressos;
      if (legacy.condicao_alunos_previos) o.condicao_alunos_previos = legacy.condicao_alunos_previos;
    }
    return o;
  }

  function renderForm(d) {
    function field(label, inputHtml, hint) {
      return '<div><span class="f-label">' + label + '</span>' + inputHtml +
        (hint ? '<div class="f-hint">' + esc(hint) + '</div>' : '') + '</div>';
    }
    const ds = function (v) {
      if (v && typeof v === 'object' && typeof v.toISOString === 'function') {
        try { return v.toISOString().slice(0, 10); } catch (_) {}
      }
      const s = valStr(v);
      return s.length >= 10 ? s.slice(0, 10) : s;
    };
    function optsWithCustom(baseOpts, current) {
      const cur = (current != null ? String(current) : '').trim();
      if (cur && baseOpts.indexOf(cur) === -1) return baseOpts.concat([cur]);
      return baseOpts.slice();
    }
    const stBase = ['', 'Rascunho', 'Em análise', 'Assinado', 'Vigente', 'Encerrado', 'Suspenso'];
    const stOpts = optsWithCustom(stBase, d.status_contrato);
    const stSel = stOpts.map(function (o) {
      const sel = (d.status_contrato === o || (!d.status_contrato && o === '')) ? ' selected' : '';
      return '<option value="' + esc(o) + '"' + sel + '>' + (o || '— Selecione —') + '</option>';
    }).join('');
    const planoBase = ['', 'Regular', 'Elite', 'ENAMED', 'Personalizado'];
    const planoOpts = optsWithCustom(planoBase, d.plano);
    const planoSel = planoOpts.map(function (o) {
      const sel = d.plano === o ? ' selected' : '';
      return '<option value="' + esc(o) + '"' + sel + '>' + (o || '— Pacote —') + '</option>';
    }).join('');
    const pagBase = ['', 'Boleto', 'Transferência', 'Cartão', 'Fatura', 'Misto', 'Outro'];
    const pagOpts = optsWithCustom(pagBase, d.forma_pagamento);
    const pagSel = pagOpts.map(function (o) {
      const sel = d.forma_pagamento === o ? ' selected' : '';
      return '<option value="' + esc(o) + '"' + sel + '>' + (o || '— Forma —') + '</option>';
    }).join('');

    return (
      '<form id="contratoForm" autocomplete="off">' +
      '<div class="form-section">' +
      '<div class="form-section-title">📋 Informações gerais</div>' +
      '<div class="form-grid">' +
      field('Status do contrato', '<select class="f-select" name="status_contrato" id="f_status">' + stSel + '</select>', 'Situação formal do vínculo com a IES') +
      field('Nº / referência do contrato', '<input class="f-input" name="numero_contrato" id="f_numero" value="' + esc(valStr(d.numero_contrato)) + '" placeholder="Ex.: 045/2025">') +
      field('Localidade (cidade / UF)', '<input class="f-input" name="localidade" value="' + esc(valStr(d.localidade)) + '" placeholder="Ex.: Fortaleza — CE">') +
      field('Início da vigência', '<input class="f-input" type="date" name="data_inicio" value="' + esc(ds(d.data_inicio)) + '">') +
      field('Término da vigência', '<input class="f-input" type="date" name="data_fim" value="' + esc(ds(d.data_fim)) + '">') +
      '</div></div>' +

      '<div class="form-section">' +
      '<div class="form-section-title">💰 Comercial e financeiro</div>' +
      '<div class="form-grid">' +
      field('Valor mensal / pacote', '<input class="f-input" name="valor_mensalidade" value="' + esc(valStr(d.valor_mensalidade)) + '" placeholder="Ex.: R$ 12.000,00">', 'Valores combinados com a IES') +
      field('Forma de pagamento', '<select class="f-select" name="forma_pagamento">' + pagSel + '</select>') +
      field('Dia de vencimento', '<input class="f-input" name="dia_vencimento" value="' + esc(valStr(d.dia_vencimento)) + '" placeholder="Ex.: dia 10">') +
      '</div>' +
      '<div class="form-grid" style="margin-top:14px"><div class="form-grid-full">' +
      '<span class="f-label">Observações comerciais / faturamento</span>' +
      '<textarea class="f-textarea" name="observacoes_comercial" placeholder="Notas de negociação, aditivos, multas…">' + esc(valStr(d.observacoes_comercial)) + '</textarea></div></div>' +
      '</div>' +

      '<div class="form-section">' +
      '<div class="form-section-title">📦 Pacote contratado</div>' +
      '<div class="form-grid">' +
      field('Plano / pacote', '<select class="f-select" name="plano">' + planoSel + '</select>') +
      field('Módulos inclusos', '<input class="f-input" name="modulos" value="' + esc(valStr(d.modulos)) + '" placeholder="Ex.: Internato + ENAMED">') +
      field('Licenças / vagas contratadas', '<input class="f-input" name="licencas_contratadas" value="' + esc(valStr(d.licencas_contratadas)) + '" placeholder="Ex.: 400 alunos ativos">') +
      '</div>' +
      '<div class="f-check"><label><input type="checkbox" name="material_fisico" id="f_mat"' + (d.material_fisico ? ' checked' : '') + '> Material físico incluso (apostilas / logística gráfica)</label></div>' +
      '</div>' +

      '<div class="form-section">' +
      '<div class="form-section-title">🎯 Simulados contratados</div>' +
      '<div class="form-grid">' +
      field('Qtd. simulados Tendências (contratada)', '<input class="f-input" type="number" min="0" name="sim_tendencias_qtd" value="' + valInt(d.sim_tendencias_qtd) + '">') +
      field('Qtd. simulados Personalizados (contratada)', '<input class="f-input" type="number" min="0" name="sim_personalizados_qtd" value="' + valInt(d.sim_personalizados_qtd) + '">') +
      '</div>' +
      '<div class="f-check"><label><input type="checkbox" name="sim_personalizados_impressos" id="f_simPersImp"' + (d.sim_personalizados_impressos ? ' checked' : '') + '> Personalizados com prova impressa (não apenas virtual)</label></div>' +
      '<div class="form-grid" style="margin-top:16px">' +
      field('Tendências já realizados (acompanhamento)', '<input class="f-input" name="tendencias_realizadas" value="' + esc(valStr(d.tendencias_realizadas)) + '" placeholder="Opcional — texto ou número">') +
      field('Personalizados já realizados', '<input class="f-input" name="personalizados_realizados" value="' + esc(valStr(d.personalizados_realizados)) + '" placeholder="Opcional">') +
      '</div></div>' +

      '<div class="form-section">' +
      '<div class="form-section-title">🛡️ Política para alunos MedCof prévios</div>' +
      '<div class="form-grid-full">' +
      '<span class="f-label">Condição acordada em contrato</span>' +
      '<textarea class="f-textarea" name="condicao_alunos_previos" placeholder="Reembolso, proporcionalidade, etc.">' + esc(valStr(d.condicao_alunos_previos)) + '</textarea></div>' +
      '</div>' +

      '<div class="form-section">' +
      '<div class="form-section-title">👤 Responsável institucional (IES)</div>' +
      '<div class="form-grid">' +
      field('Nome', '<input class="f-input" name="resp_nome" value="' + esc(valStr(d.resp_nome)) + '">') +
      field('E-mail', '<input class="f-input" type="email" name="resp_email" value="' + esc(valStr(d.resp_email)) + '">') +
      field('Telefone / WhatsApp', '<input class="f-input" name="resp_telefone" value="' + esc(valStr(d.resp_telefone)) + '">') +
      field('Cargo / função', '<input class="f-input" name="resp_cargo" value="' + esc(valStr(d.resp_cargo)) + '" placeholder="Ex.: Coord. acadêmica">') +
      '</div></div>' +

      '<div class="form-section">' +
      '<div class="form-section-title">📝 Observações gerais</div>' +
      '<div class="form-grid-full">' +
      '<textarea class="f-textarea" name="observacoes_gerais" placeholder="Qualquer outro detalhe relevante do contrato.">' + esc(valStr(d.observacoes_gerais)) + '</textarea></div>' +
      '</div>' +
      '</form>'
    );
  }

  async function loadUsersSection() {
    const wrap = document.getElementById('usersSection');
    if (!wrap) return;
    try {
      const rows = await window._supaRestAdmin(
        'usuarios_autorizados',
        'select=nome,email,ativo&instituicao=eq.' + encodeURIComponent(ies)
      );
      if (!rows || !rows.length) {
        wrap.innerHTML = '<div class="history-empty">Nenhum usuário cadastrado para esta IES ainda.</div>';
        return;
      }
      rows.sort(function (a, b) { return (b.ativo === true) - (a.ativo === true); });
      wrap.innerHTML = '<div style="display:flex;flex-direction:column;gap:10px">' + rows.map(function (u) {
        const ini = (u.nome || u.email || '').split(' ').slice(0, 2).map(function (w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
        return '<div class="user-card"><div class="user-avatar">' + esc(ini) + '</div><div style="flex:1;min-width:0">' +
          '<div class="user-nome">' + esc(u.nome || '—') + '</div><div class="user-email">' + esc(u.email) + '</div></div>' +
          '<span class="' + (u.ativo ? 'user-status-ok' : 'user-status-off') + '">' + (u.ativo ? '● Ativo' : '● Inativo') + '</span></div>';
      }).join('') + '</div>';
    } catch (e) {
      wrap.innerHTML = '<div class="error-box" style="padding:20px">⚠️ ' + esc(e.message) + '</div>';
    }
  }

  const tipoCls = { reuniao: 'ativ-tipo-reuniao', ligacao: 'ativ-tipo-ligacao', email: 'ativ-tipo-email' };
  const tipoLabel = { reuniao: '🤝 Reunião', ligacao: '📞 Ligação', email: '✉️ E-mail', outro: '📌 Outro' };

  async function loadAtividades() {
    const el = document.getElementById('ativList');
    if (!el) return;
    try {
      const data = await window._supaRest(
        'atividades_contrato',
        'select=*&ies_slug=eq.' + encodeURIComponent(ies) + '&order=data.desc'
      );
      if (!data || !data.length) {
        el.innerHTML = '<div class="history-empty"><div style="font-size:2rem;margin-bottom:8px">📋</div>Nenhum registro ainda.<br>Registre reuniões e interações com a coordenação.</div>';
        return;
      }
      el.innerHTML = data.map(function (a) {
        const dt = a.data ? new Date(a.data + 'T12:00:00').toLocaleDateString('pt-BR') : '—';
        const cls = tipoCls[a.tipo] || 'ativ-tipo-outro';
        const label = tipoLabel[a.tipo] || tipoLabel.outro;
        return '<div class="ativ-card">' +
          '<button type="button" class="ativ-delete" data-ativid="' + esc(a.id) + '" title="Excluir">✕</button>' +
          '<span class="ativ-tipo ' + cls + '">' + label + '</span> ' +
          '<span class="ativ-data">📅 ' + dt + '</span>' +
          (a.participantes ? '<div class="ativ-participantes">👥 ' + esc(a.participantes) + '</div>' : '') +
          '<div class="ativ-desc">' + esc(a.descricao || '') + '</div>' +
          (a.registrado_por ? '<div style="font-size:0.68rem;color:var(--text-muted);margin-top:8px;text-align:right">Por: ' + esc(a.registrado_por) + '</div>' : '') +
          '</div>';
      }).join('');
      el.querySelectorAll('.ativ-delete').forEach(function (btn) {
        btn.onclick = function () { window._deleteAtiv(btn.getAttribute('data-ativid')); };
      });
    } catch (e) {
      el.innerHTML = '<div class="history-empty" style="color:var(--accent)">⚠️ ' + esc(e.message) + '</div>';
    }
  }

  window._openAtivModal = function () {
    const old = document.getElementById('ativModal');
    if (old) old.remove();
    const m = document.createElement('div');
    m.id = 'ativModal';
    m.className = 'ativ-form-overlay';
    m.innerHTML =
      '<div class="ativ-form-box">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
      '<h3 style="font-size:1.05rem;font-weight:700">📝 Registrar atividade</h3>' +
      '<button type="button" id="ativCloseX" style="background:none;border:none;color:var(--text-soft);font-size:1.4rem;cursor:pointer">&times;</button></div>' +
      '<div style="margin-bottom:14px"><span class="f-label">Tipo</span>' +
      '<select id="ativTipo" class="f-input">' +
      '<option value="reuniao">🤝 Reunião</option><option value="ligacao">📞 Ligação</option>' +
      '<option value="email">✉️ E-mail</option><option value="outro">📌 Outro</option></select></div>' +
      '<div style="margin-bottom:14px"><span class="f-label">Data</span>' +
      '<input type="date" id="ativData" class="f-input" value="' + new Date().toISOString().split('T')[0] + '"></div>' +
      '<div style="margin-bottom:14px"><span class="f-label">Participantes</span>' +
      '<input type="text" id="ativPart" class="f-input" placeholder="Nomes"></div>' +
      '<div style="margin-bottom:14px"><span class="f-label">Descrição</span>' +
      '<textarea id="ativDesc" class="f-textarea" rows="4"></textarea></div>' +
      '<div id="ativError" style="font-size:0.82rem;color:var(--accent);min-height:18px;margin-bottom:8px;text-align:center"></div>' +
      '<div style="display:flex;gap:10px"><button type="button" id="ativCancel" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text-soft);font-weight:600;cursor:pointer">Cancelar</button>' +
      '<button type="button" id="ativSaveBtn" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-weight:700;cursor:pointer">Salvar</button></div></div>';
    document.body.appendChild(m);
    function close() { m.remove(); }
    m.onclick = function (e) { if (e.target === m) close(); };
    document.getElementById('ativCloseX').onclick = close;
    document.getElementById('ativCancel').onclick = close;
    document.getElementById('ativSaveBtn').onclick = function () { window._saveAtiv(); };
  };

  window._saveAtiv = async function () {
    const tipo = document.getElementById('ativTipo').value;
    const data = document.getElementById('ativData').value;
    const part = document.getElementById('ativPart').value.trim();
    const desc = document.getElementById('ativDesc').value.trim();
    const errEl = document.getElementById('ativError');
    const btn = document.getElementById('ativSaveBtn');
    if (!data) { errEl.textContent = 'Informe a data.'; return; }
    if (!desc) { errEl.textContent = 'Descreva a atividade.'; return; }
    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Salvando…';
    try {
      let email = '';
      try {
        const sb = getSupabaseClient();
        const { data: { session } } = await sb.auth.getSession();
        email = session && session.user ? session.user.email || '' : '';
      } catch (_) {}
      const resp = await window._supaWrite('atividades_contrato', 'POST', {
        ies_slug: ies,
        tipo: tipo,
        data: data,
        participantes: part,
        descricao: desc,
        registrado_por: email
      });
      if (!resp.ok) throw new Error(await resp.text());
      document.getElementById('ativModal').remove();
      loadAtividades();
    } catch (e) {
      errEl.textContent = esc(e.message);
      btn.disabled = false;
      btn.textContent = 'Salvar';
    }
  };

  window._deleteAtiv = async function (id) {
    if (!confirm('Excluir este registro?')) return;
    try {
      const resp = await window._supaWrite('atividades_contrato?id=eq.' + encodeURIComponent(id), 'DELETE');
      if (!resp.ok) throw new Error(await resp.text());
      loadAtividades();
    } catch (e) {
      alert(e.message);
    }
  };

  function collectPayload() {
    const f = document.getElementById('contratoForm');
    const fd = new FormData(f);
    return {
      ies_slug: ies,
      status_contrato: (fd.get('status_contrato') || '').trim(),
      numero_contrato: (fd.get('numero_contrato') || '').trim(),
      localidade: (fd.get('localidade') || '').trim(),
      data_inicio: (fd.get('data_inicio') || '').trim() || null,
      data_fim: (fd.get('data_fim') || '').trim() || null,
      valor_mensalidade: (fd.get('valor_mensalidade') || '').trim(),
      forma_pagamento: (fd.get('forma_pagamento') || '').trim(),
      dia_vencimento: (fd.get('dia_vencimento') || '').trim(),
      observacoes_comercial: (fd.get('observacoes_comercial') || '').trim(),
      plano: (fd.get('plano') || '').trim(),
      modulos: (fd.get('modulos') || '').trim(),
      licencas_contratadas: (fd.get('licencas_contratadas') || '').trim(),
      material_fisico: document.getElementById('f_mat').checked,
      sim_tendencias_qtd: valInt(fd.get('sim_tendencias_qtd')),
      sim_personalizados_qtd: valInt(fd.get('sim_personalizados_qtd')),
      sim_personalizados_impressos: document.getElementById('f_simPersImp').checked,
      tendencias_realizadas: (fd.get('tendencias_realizadas') || '').trim(),
      personalizados_realizados: (fd.get('personalizados_realizados') || '').trim(),
      condicao_alunos_previos: (fd.get('condicao_alunos_previos') || '').trim(),
      resp_nome: (fd.get('resp_nome') || '').trim(),
      resp_email: (fd.get('resp_email') || '').trim(),
      resp_telefone: (fd.get('resp_telefone') || '').trim(),
      resp_cargo: (fd.get('resp_cargo') || '').trim(),
      observacoes_gerais: (fd.get('observacoes_gerais') || '').trim(),
      updated_at: new Date().toISOString()
    };
  }

  async function saveContrato() {
    const btn = document.getElementById('btnSalvarContrato');
    const msg = document.getElementById('saveBarMsg');
    btn.disabled = true;
    msg.textContent = 'Salvando…';
    try {
      const payload = collectPayload();
      const resp = await window._supaWrite(
        'contratos_ies?on_conflict=ies_slug',
        'POST',
        payload,
        { prefer: 'return=minimal' }
      );
      if (!resp.ok) throw new Error(await resp.text());
      const rootEl = document.getElementById('contractRoot');
      if (rootEl) rootEl.setAttribute('data-has-saved', '1');
      msg.textContent = '✓ Alterações gravadas com sucesso.';
      setTimeout(function () {
        msg.textContent = rootEl && rootEl.getAttribute('data-has-saved') === '1'
          ? 'Contrato cadastrado — edite os campos e salve para atualizar.'
          : 'Preencha os campos e salve para registrar o contrato.';
      }, 4500);
    } catch (e) {
      msg.textContent = 'Erro: ' + e.message;
      alert(e.message);
    } finally {
      btn.disabled = false;
    }
  }

  (async function init() {
    const instRow = await loadInstNome();

    let dbRow = null;
    try {
      const rows = await window._supaRestAdmin(
        'contratos_ies',
        'select=*&ies_slug=eq.' + encodeURIComponent(ies) + '&limit=1'
      );
      if (rows && rows[0]) dbRow = rows[0];
    } catch (e) {
      root.innerHTML = '<div class="error-box">' + esc(e.message) + '</div>';
      return;
    }

    const legacy = LEGACY_DEFAULTS[ies] || null;
    const merged = mergeDefaults(dbRow, legacy, instRow);
    const hasContratoSalvo = !!dbRow;

    root.setAttribute('data-has-saved', hasContratoSalvo ? '1' : '0');
    const bannerHtml = hasContratoSalvo
      ? '<div class="edit-banner">✓ <strong>Contrato já cadastrado no sistema.</strong> Altere qualquer campo abaixo e use <strong>Salvar dados do contrato</strong> (barra inferior) para atualizar — quantas vezes precisar.</div>'
      : '<div class="edit-banner edit-banner-new"><strong>Primeiro cadastro:</strong> preencha os dados e salve. Depois, esta mesma página carregará o que foi gravado para você editar sempre que necessário.</div>';

    document.getElementById('saveBarMsg').textContent = hasContratoSalvo
      ? 'Contrato cadastrado — edite os campos e salve para atualizar.'
      : 'Preencha os campos e salve para registrar o contrato.';

    root.innerHTML =
      bannerHtml +
      renderForm(merged) +
      '<div class="form-section">' +
      '<div class="form-section-title">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Usuários da instituição (cadastro)</div>' +
      '<div id="usersSection"><div class="history-empty">Carregando…</div></div></div>' +
      '<div class="form-section">' +
      '<div class="form-section-title">📋 Histórico de atividade</div>' +
      '<div style="display:flex;justify-content:flex-end;margin-bottom:12px">' +
      '<button type="button" class="ativ-btn-add" onclick="window._openAtivModal()">+ Registrar atividade</button></div>' +
      '<div id="ativList"><div class="history-empty">Carregando…</div></div>' +
      '</div>';

    saveBar.style.display = 'flex';
    document.getElementById('btnSalvarContrato').onclick = saveContrato;

    loadUsersSection();
    loadAtividades();
  })();
})();
</script>
<!-- Supabase (Postgres): CREATE TABLE IF NOT EXISTS contratos_ies ( ies_slug text PRIMARY KEY, status_contrato text, numero_contrato text, localidade text, data_inicio date, data_fim date, valor_mensalidade text, forma_pagamento text, dia_vencimento text, observacoes_comercial text, plano text, modulos text, licencas_contratadas text, material_fisico boolean, sim_tendencias_qtd int, sim_personalizados_qtd int, sim_personalizados_impressos boolean, tendencias_realizadas text, personalizados_realizados text, condicao_alunos_previos text, resp_nome text, resp_email text, resp_telefone text, resp_cargo text, observacoes_gerais text, updated_at timestamptz ); -->
</body>
</html>
