<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <link rel="stylesheet" href="shared.css?v=2">
  <style>
    .btn-logout {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px;
      background: transparent; border: 1px solid #ccc;
      color: #555; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
      white-space: nowrap;
    }
    .btn-logout:hover { background: rgba(220,38,38,0.08); border-color: rgba(220,38,38,0.5); color: #dc2626; }
    .btn-logout svg { flex-shrink: 0; }
  </style>
</head>
<body data-page="simulados">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark" data-institution-initials>CEU</div>
        <div class="brand-copy">
          <div class="brand-title" data-institution-brand>CEUMA IMPERATRIZ × MedCof</div>
          <div class="brand-subtitle">Simulados — tendências e personalizados</div>
        </div>
      </div>
      <nav class="main-nav" aria-label="Navegação principal">
        <a class="nav-link" href="index.html">Inicial</a>
        <a class="nav-link" href="engajamento.html">Engajamento</a>
        <a class="nav-link" href="periodo-detalhado.html">Período detalhado</a>
        <a class="nav-link active" href="simulado-personalizado.html">Simulados</a>
      </nav>
      <button class="btn-logout" id="btnLogout" onclick="handleLogout()" title="Sair da conta">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </header>

  <main class="page-shell">
    <!-- Container principal — todo o conteúdo é injetado via JS -->
    <div id="simuladosRoot"></div>
  </main>

  <footer class="site-footer">
    Painel institucional <strong data-institution-brand>CEUMA IMPERATRIZ × MedCof</strong>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="dashboard-data.js"></script>
  <script src="shared.js?v=2"></script>
  <script src="/brand-loader.js?v=2"></script>
