[dev]
  # Servidor estático interno do CLI (padrão 3999). Se aparecer EADDRINUSE, feche outro
  # `netlify dev` ou rode: lsof -i :3999 (ou a porta abaixo) e encerre o processo.
  staticServerPort = 49876

[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # esbuild em [functions] (não só em [functions."*"]) para o bundler aplicar em deploys Git/CI.
  node_bundler = "esbuild"
  # Garante server/ ao lado do handler quando o zip não preserva ../../ (Lambda: /var/task).
  included_files = ["server/**"]

  [functions.deploy-ies]
    timeout = 60

  [functions.coordenador-chat]
    timeout = 60

  [functions.send-boletim-email]
    timeout = 60

[[headers]]
  for = "/.netlify/functions/*"

  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Max-Age = "86400"
