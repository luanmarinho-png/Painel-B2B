<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedCof B2B — Recuperar Senha</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase-config.js"></script>
<style>
  :root {
    --bg: #0f1117; --bg-card: #181b23; --bg-elevated: #1e2230;
    --border: #2a2f3e; --border-subtle: #222738;
    --text: #e8eaf0; --text-soft: #8b91a5; --text-muted: #5c6175;
    --accent: #dc2626; --accent-soft: rgba(220,38,38,0.12); --accent-glow: rgba(220,38,38,0.25);
    --green: #22c55e; --radius: 16px; --radius-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(42,47,62,0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(42,47,62,0.4) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 70%);
  }
  .bg-glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(220,38,38,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .card {
    position: relative; z-index: 2; width: min(100%, 420px);
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 24px; padding: 40px 36px 36px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
  }
  .logo { display: block; max-width: 160px; margin: 0 auto 8px; }
  .badge {
    display: block; text-align: center; font-size: 0.7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); margin-bottom: 28px;
  }
  .title { font-size: 1.2rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .subtitle { text-align: center; font-size: 0.85rem; color: var(--text-soft); margin-bottom: 28px; line-height: 1.5; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-soft); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input {
    width: 100%; padding: 12px 14px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--bg-elevated);
    color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field input::placeholder { color: var(--text-muted); }
  .error { font-size: 0.82rem; color: var(--accent); min-height: 22px; margin-bottom: 4px; text-align: center; }
  .success { font-size: 0.88rem; color: var(--green); text-align: center; margin-bottom: 16px; line-height: 1.5; }
  .btn {
    display: block; width: 100%; padding: 14px; border: none;
    border-radius: var(--radius-sm); background: var(--accent); color: #fff;
    font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
  }
  .btn:hover:not(:disabled) { background: #b91c1c; box-shadow: 0 0 20px var(--accent-glow); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .back-link { display: block; text-align: center; margin-top: 18px; font-size: 0.8rem; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .back-link:hover { color: var(--accent); }
  .footer { margin-top: 24px; text-align: center; font-size: 0.7rem; color: var(--text-muted); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="card">
  <img src="/facene/logo-novo-medcof.avif" alt="MedCof" class="logo" onerror="this.style.display='none'">
  <span class="badge">Recuperação de Senha</span>

  <!-- Etapa 1: Solicitar e-mail -->
  <div id="stepEmail">
    <h2 class="title">Esqueceu sua senha?</h2>
    <p class="subtitle">Informe seu e-mail e enviaremos um link para você criar uma nova senha.</p>
    <div class="field">
      <label for="emailInput">E-mail</label>
      <input id="emailInput" type="email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="error" id="emailError"></div>
    <button class="btn" id="sendBtn">Enviar link de recuperação</button>
    <a href="/admin.html" class="back-link">← Voltar para o login</a>
  </div>

  <!-- Etapa 2: Redirecionando -->
  <div id="stepSent" style="display:none; text-align:center">
    <div style="font-size:3rem;margin-bottom:16px">🔐</div>
    <h2 class="title">Redirecionando...</h2>
    <p class="subtitle">Aguarde, você será levado à página para criar sua nova senha.</p>
    <div style="margin-top:20px">
      <div style="width:40px;height:40px;border:4px solid var(--accent-soft);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div>
    </div>
  </div>

  <div class="footer">Grupo MedCof &copy; 2026 — Uso interno</div>
</div>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
(async () => {
  const sendBtn = document.getElementById('sendBtn');
  const emailError = document.getElementById('emailError');

  async function doReset() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) { emailError.textContent = 'Informe seu e-mail.'; return; }

    sendBtn.disabled = true;
    sendBtn.textContent = 'Gerando link...';
    emailError.textContent = '';

    try {
      const resp = await fetch('/.netlify/functions/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });

      const data = await resp.json();

      if (!resp.ok || data.error) {
        emailError.textContent = data.error || 'Erro ao gerar link. Tente novamente.';
        sendBtn.disabled = false;
        sendBtn.textContent = 'Enviar link de recuperação';
        return;
      }

      // Mostrar tela de carregamento
      document.getElementById('stepEmail').style.display = 'none';
      document.getElementById('stepSent').style.display = 'block';

      if (data.link) {
        // Redirecionar direto para o link de recuperação (sem precisar de e-mail)
        setTimeout(() => { window.location.href = data.link; }, 800);
      } else {
        // E-mail não encontrado no sistema
        document.getElementById('stepEmail').style.display = 'block';
        document.getElementById('stepSent').style.display = 'none';
        emailError.textContent = 'E-mail não encontrado ou sem acesso ao sistema.';
        sendBtn.disabled = false;
        sendBtn.textContent = 'Enviar link de recuperação';
      }

    } catch(e) {
      emailError.textContent = 'Erro ao conectar. Verifique sua conexão e tente novamente.';
      sendBtn.disabled = false;
      sendBtn.textContent = 'Enviar link de recuperação';
    }
  }

  sendBtn.addEventListener('click', doReset);
  document.getElementById('emailInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doReset();
  });
})();
</script>
</body>
</html>
